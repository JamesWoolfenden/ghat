---
name: ghat
on:
  schedule:
    - cron: 17 4 * * 1
  workflow_dispatch:

permissions: read-all

jobs:
  pin:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: JamesWoolfenden/ghat@23f983caae0cc73d67f16f691dc47211488f5dc1 # v0.1.46
        with:
          directory: .
      - uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          commit-message: "chore(ghat): pin dependencies to immutable refs"
          title: "chore(ghat): pin dependencies to immutable refs"
          body: Automated by ghat sweep.
          branch: ghat/pin
          delete-branch: true
