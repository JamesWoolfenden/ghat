name: extensions

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to attach the extension artifacts to (e.g. v0.1.35)
        required: true
        type: string
  push:
    branches: [master]
    paths:
      - editors/**
      - .github/workflows/release-extensions.yml
  pull_request:
    paths:
      - editors/**
      - .github/workflows/release-extensions.yml

permissions:
  contents: read

jobs:
  vscode:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json
      - run: make vsix
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ghat-vsix
          path: bin/ghat.vsix

  jetbrains:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      - run: make jetbrains-ext
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ghat-jetbrains
          path: bin/ghat-jetbrains.zip

  attach:
    if: github.event_name == 'workflow_dispatch'
    needs: [vscode, jetbrains]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true
      - name: Attach extension artifacts to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ inputs.tag }}" \
            dist/ghat.vsix dist/ghat-jetbrains.zip \
            --repo "${{ github.repository }}" --clobber
